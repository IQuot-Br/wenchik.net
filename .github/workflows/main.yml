name: Build NovaBlog APK (Capacitor)

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Gerar APK NovaBlog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar dependências do Node
        run: npm install

      - name: Sincronizar código com o Android
        run: npx cap sync

      - name: Tornar o Gradle executável
        run: chmod +x gradlew
        working-directory: android

      - name: Compilar APK (Debug)
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Fazer upload do APK NovaBlog
        uses: actions/upload-artifact@v4
        with:
          name: NovaBlog-Debug-APK
          path: "android/app/build/outputs/apk/debug/app-debug.apk"
